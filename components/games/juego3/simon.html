<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="simon.css" type="text/css" rel="stylesheet">
    <title>Simon Says</title>
</head>
<body>
    <div id="menu">
        <button onclick="ajustarDificultad('1')">Fácil</button>
        <button onclick="ajustarDificultad('2')">Normal</button>
        <button onclick="ajustarDificultad('3')">Difícil</button>
        <button id="btn-reiniciar" onclick="reiniciarJuego()">Reiniciar</button>
    </div>

    <div id="info">
        <span>Nivel: <b id="nivel">0</b></span>
        <span>Puntos: <b id="puntos">0</b></span>
    </div>

    <div id="tablero" class="tablero"></div>

    <script src="simon.js"></script>
</body>
</html>
